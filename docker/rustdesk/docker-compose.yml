services:
  rustdesk-server:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbs
    restart: always
    ports:
      - 21115:21115
      - 21116:21116
      - 21116:21116/udp
      - 21118:21118
    volumes:
      - ./data:/root
    command: hbbs
  rustdesk-relay:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbr
    restart: always
    ports:
      - 21117:21117
      - 21119:21119
    volumes:
      - ./data:/root
    command: hbbr
