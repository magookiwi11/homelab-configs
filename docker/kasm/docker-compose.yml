# Browser-based GUI containers via KasmVNC (linuxserver.io).
# Each service is a full desktop app accessible via browser.
services:
  firefox:
    image: lscr.io/linuxserver/firefox:latest
    container_name: firefox
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./firefox:/config
    ports:
      - 3003:3000
      - 3013:3001
  libreoffice:
    image: lscr.io/linuxserver/libreoffice:latest
    container_name: libreoffice
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./libreoffice:/config
    ports:
      - 3004:3000
      - 3014:3001
obsidian:
    image: lscr.io/linuxserver/obsidian:latest
    container_name: obsidian
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./obsidian:/config
    ports:
      - 3005:3000
      - 3015:3001
  kali:
    image: lscr.io/linuxserver/kali-linux:latest
    container_name: kali
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./kali:/config
    ports:
      - 3006:3000
      - 3016:3001
